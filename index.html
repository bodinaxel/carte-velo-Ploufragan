<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Carte Vélo</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    #info {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 40px;
      border-radius: 8px;
      z-index: 1000;
      font-family: Arial;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #28a745;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div id="info">
  <p style="font-size: 24px; margin: 20px 0;">📍 Autoriser la localisation pour voir votre position</p>
  <button onclick="activerLocalisation()">Activer ma position</button>
  <button onclick="refuserLocalisation()" style="background:#dc3545; margin-left:10px;">
    Refuser
  </button>
</div>

<div id="map"></div>

<script>
  // Initialisation carte (centrée sur Ploufragan)
  var map = L.map('map').setView([48.4906, -2.7950], 13);

  // Fond de carte
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // Bouton localisation
  function activerLocalisation() {
    map.locate({ setView: true, maxZoom: 16 });
  }

  // Quand position trouvée
  function onLocationFound(e) {
    L.marker(e.latlng).addTo(map)
      .bindPopup("Vous êtes ici 🚴‍♂️").openPopup();

    L.circle(e.latlng, {
      radius: e.accuracy,
      color: 'blue',
      fillOpacity: 0.1
    }).addTo(map);

    document.getElementById("info").style.display = "none";
  }

  function onLocationError(e) {
    alert("Impossible d'accéder à la localisation");
  }

  map.on('locationfound', onLocationFound);
  map.on('locationerror', onLocationError);

  // Charger les traces cyclables avec couleurs par type
  fetch("Traces_cyclable.geojson")
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        onEachFeature: function(feature, layer) {
          let typeTrace = feature.properties["Type de tracé"];
          let color = "green";
          
          if (typeTrace === "Voie verte") {
            color = "green";
          } else if (typeTrace === "Piste cyclable") {
            color = "blue";
          } else if (typeTrace === "Bande cyclable") {
            color = "orange";
          } else if (typeTrace === "CVCB") {
            color = "red";
          }
          
          layer.setStyle({
            color: color,
            weight: 4
          });
        }
      }).addTo(map);
    })
    .catch(err => console.log(err));

</script>

</body>
</html>
