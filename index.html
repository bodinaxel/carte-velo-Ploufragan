<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Carte Vélo</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    #info {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 40px;
      border-radius: 8px;
      z-index: 9999;
      font-family: Arial;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    /* Croix */
    #closeBtn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 20px;
      cursor: pointer;
      color: #666;
    }

    #closeBtn:hover {
      color: black;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #28a745;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    /* Légende */
    .info.legend {
      background: white;
      padding: 10px 15px;
      font-size: 14px;
      line-height: 18px;
      color: #333;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.2);
    }

    .info.legend h4 {
      margin: 0 0 5px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div id="info">
  <div id="closeBtn">✖</div>

  <p style="font-size: 24px; margin: 20px 0;">
    📍 Autoriser la localisation pour voir votre position
  </p>

  <button id="btnActiver">Activer ma position</button>
</div>

<div id="map"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // Initialisation carte
  var map = L.map('map').setView([48.4906, -2.7950], 13);

  // Fond de carte
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  // Bouton activer localisation
  document.getElementById("btnActiver").addEventListener("click", function() {
    map.locate({ setView: true, maxZoom: 16 });
  });

  // Croix pour fermer
  document.getElementById("closeBtn").addEventListener("click", function() {
    document.getElementById("info").style.display = "none";
  });

  // Position trouvée
  function onLocationFound(e) {
    L.marker(e.latlng).addTo(map)
      .bindPopup("Vous êtes ici 🚴‍♂️")
      .openPopup();

    L.circle(e.latlng, {
      radius: e.accuracy,
      color: 'blue',
      fillOpacity: 0.1
    }).addTo(map);

    document.getElementById("info").style.display = "none";
  }

  // Erreur localisation
  function onLocationError(e) {
    document.getElementById("info").innerHTML = `
      <div id="closeBtn">✖</div>
      <p style="font-size: 20px;">❌ Localisation refusée ou indisponible</p>
      <button id="retry">Réessayer</button>
    `;

    document.getElementById("closeBtn").addEventListener("click", function() {
      document.getElementById("info").style.display = "none";
    });

    document.getElementById("retry").addEventListener("click", function() {
      map.locate({ setView: true, maxZoom: 16 });
    });
  }

  map.on('locationfound', onLocationFound);
  map.on('locationerror', onLocationError);

  // Charger les traces cyclables
  fetch("Traces_cyclable.geojson")
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        style: function(feature) {
          let typeTrace = feature.properties["Type de tracé"];
          let color = "green";
          
          if (typeTrace === "Voie verte") color = "green";
          else if (typeTrace === "Piste cyclable") color = "blue";
          else if (typeTrace === "Bande cyclable") color = "orange";
          else if (typeTrace === "CVCB") color = "red";

          return {
            color: color,
            weight: 4
          };
        }
      }).addTo(map);
    })
    .catch(err => console.log(err));

  // Couleurs des lieux notables
  var lieuxColors = {
    "Mairie": "#e74c3c",
    "Le Pollen": "#3498db",
    "Espace Victor Hugo": "#f1c40f",
    "Centre Technique Municipal": "#27ae60",
    "Le Tremplin": "#e67e22",
    "EHPAD": "#9b59b6"
  };
  var defaultLieuColor = "#555555";

  // Charger les lieux notables
  fetch("lieuxnotables.geojson")
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        pointToLayer: function(feature, latlng) {
          var nom = feature.properties["Nom du bâtiment"];
          var color = lieuxColors[nom] || defaultLieuColor;
          return L.circleMarker(latlng, {
            radius: 10,
            fillColor: color,
            color: "#ffffff",
            weight: 2,
            opacity: 1,
            fillOpacity: 0.9
          });
        },
        onEachFeature: function(feature, layer) {
          var nom = feature.properties["Nom du bâtiment"];
          if (nom) {
            layer.bindPopup("<b>" + nom + "</b>");
          }
        }
      }).addTo(map);
    })
    .catch(err => console.log(err));

  // Légende en haut à droite
  var legend = L.control({ position: "topright" });

  legend.onAdd = function (map) {
    var div = L.DomUtil.create("div", "info legend");

    var lieuxItems = Object.entries(lieuxColors).map(function(entry) {
      return '<div><span style="background:' + entry[1] + ';width:14px;height:14px;display:inline-block;margin-right:8px;border-radius:50%;vertical-align:middle;"></span>' + entry[0] + '</div>';
    }).join('');

    div.innerHTML = `
      <h4>Tracés cyclables</h4>
      <div><span style="background:green;width:25px;height:4px;display:inline-block;margin-right:8px;vertical-align:middle;"></span>Voie verte</div>
      <div><span style="background:blue;width:25px;height:4px;display:inline-block;margin-right:8px;vertical-align:middle;"></span>Piste cyclable</div>
      <div><span style="background:orange;width:25px;height:4px;display:inline-block;margin-right:8px;vertical-align:middle;"></span>Bande cyclable</div>
      <div><span style="background:red;width:25px;height:4px;display:inline-block;margin-right:8px;vertical-align:middle;"></span>Chaucidou</div>
      <h4 style="margin-top:8px;">Lieux notables</h4>
    ` + lieuxItems;

    return div;
  };

  legend.addTo(map);

});
</script>

</body>
</html>
