<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Carte Vélo</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    #info {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 40px;
      border-radius: 8px;
      z-index: 9999;
      font-family: Arial;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    #closeBtn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 20px;
      cursor: pointer;
      color: #666;
    }

    #closeBtn:hover {
      color: black;
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #28a745;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .info.legend {
      background: white;
      padding: 10px 15px;
      font-size: 14px;
      line-height: 18px;
      color: #333;
      border-radius: 6px;
      box-shadow: 0 0 6px rgba(0,0,0,0.2);
    }

    .info.legend h4 {
      margin: 5px 0;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div id="info">
  <div id="closeBtn">✖</div>

  <p style="font-size: 24px; margin: 20px 0;">
    📍 Autoriser la localisation pour voir votre position
  </p>

  <button id="btnActiver">Activer ma position</button>
</div>

<div id="map"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  var map = L.map('map').setView([48.4906, -2.7950], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  document.getElementById("btnActiver").addEventListener("click", function() {
    map.locate({ setView: true, maxZoom: 16 });
  });

  document.getElementById("closeBtn").addEventListener("click", function() {
    document.getElementById("info").style.display = "none";
  });

  function onLocationFound(e) {
    L.marker(e.latlng).addTo(map)
      .bindPopup("Vous êtes ici 🚴‍♂️")
      .openPopup();

    L.circle(e.latlng, {
      radius: e.accuracy,
      color: 'blue',
      fillOpacity: 0.1
    }).addTo(map);

    document.getElementById("info").style.display = "none";
  }

  function onLocationError(e) {
    document.getElementById("info").innerHTML = `
      <div id="closeBtn">✖</div>
      <p style="font-size: 20px;">❌ Localisation refusée ou indisponible</p>
      <button id="retry">Réessayer</button>
    `;

    document.getElementById("closeBtn").addEventListener("click", function() {
      document.getElementById("info").style.display = "none";
    });

    document.getElementById("retry").addEventListener("click", function() {
      map.locate({ setView: true, maxZoom: 16 });
    });
  }

  map.on('locationfound', onLocationFound);
  map.on('locationerror', onLocationError);

  // -------------------------
  // TRACES CYCLABLES
  // -------------------------
  fetch("Traces_cyclable.geojson")
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        style: function(feature) {
          let typeTrace = feature.properties["Type de tracé"];
          let color = "green";

          if (typeTrace === "Voie verte") color = "green";
          else if (typeTrace === "Piste cyclable") color = "blue";
          else if (typeTrace === "Bande cyclable") color = "orange";
          else if (typeTrace === "CVCB") color = "red";

          return {
            color: color,
            weight: 4
          };
        }
      }).addTo(map);
    })
    .catch(err => console.log(err));

// -------------------------
// LIEUX NOTABLES
// -------------------------
fetch("lieuxnotables.geojson")
  .then(res => res.json())
  .then(data => {

    function getColor(nom) {
      if (!nom) return "black"; // 🔥 évite le crash

      nom = nom.toLowerCase().trim();

      if (nom === "EHPAD") return "green";
      else if (nom === "Le Pollen") return "blue";
      else if (nom === "Mairie") return "orange";
      else if (nom === "Centre Technique Municipal") return "red";
      else if (nom === "Le Tremplin") return "yellow";
      else if (nom === "Espace Victor Hugo") return "purple";
      else return "black";
    }

    L.geoJSON(data, {

      pointToLayer: function(feature, latlng) {

        let nom = feature.properties["Nom du bâtiment"] || "";

        return L.circleMarker(latlng, {
          radius: 7,
          fillColor: getColor(nom),
          color: "#000",
          weight: 1,
          fillOpacity: 0.9
        });
      },

      onEachFeature: function(feature, layer) {
        let nom = feature.properties["Nom du bâtiment"];

        if (nom) {
          layer.bindPopup(nom);
        } else {
          layer.bindPopup("Lieu inconnu");
        }
      }

    }).addTo(map);

  })
  .catch(err => console.log(err));
🔍 Pourquoi ça marche m
  // -------------------------
  // LEGENDE
  // -------------------------
  var legend = L.control({ position: "topright" });

  legend.onAdd = function () {
    var div = L.DomUtil.create("div", "info legend");

    div.innerHTML = `
      <h4>Voies cyclables</h4>
      <div><span style="background:green;width:25px;height:25px;display:inline-block;margin-right:8px;"></span>Voie verte</div>
      <div><span style="background:blue;width:25px;height:25px;display:inline-block;margin-right:8px;"></span>Piste cyclable</div>
      <div><span style="background:orange;width:25px;height:25px;display:inline-block;margin-right:8px;"></span>Bande cyclable</div>
      <div><span style="background:red;width:25px;height:25px;display:inline-block;margin-right:8px;"></span>Chaucidou</div>

      <hr>

      <h4>Lieux notables</h4>
      <div><span style="background:gray;width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:8px;"></span>Centre Technique Municipal</div>
      <div><span style="background:red;width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:8px;"></span>EPHAD</div>
      <div><span style="background:blue;width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:8px;"></span>Mairie</div>
      <div><span style="background:orange;width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:8px;"></span>Le Tremplin</div>
      <div><span style="background:purple;width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:8px;"></span>Espace Victor Hugo</div>
      <div><span style="background:green;width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:8px;"></span>Le Pollen</div>
    `;

    return div;
  };

  legend.addTo(map);

});
</script>

</body>
</html>
